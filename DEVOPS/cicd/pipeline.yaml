name: Loja Veloz CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: Lint
      run: go vet ./...
      
    - name: Run Tests
      run: go test ./...
      
    - name: Build Docker Image
      run: |
        docker build -t loja-veloz/orders:${{ github.sha }} ./services/orders
        
    - name: Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'loja-veloz/orders:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Push to Registry
      if: success()
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        docker push loja-veloz/orders:${{ github.sha }}

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Set Kubernetes Context
      uses: azure/k8s-set-context@v3
      with:
        kubeconfig: ${{ secrets.KUBE_CONFIG }}
        
    - name: Deploy to K8s
      run: |
        kubectl set image deployment/orders orders=loja-veloz/orders:${{ github.sha }}
        kubectl rollout status deployment/orders
